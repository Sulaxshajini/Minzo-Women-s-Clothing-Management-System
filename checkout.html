<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minzo Website</title>
  <!-- Bootstrap CSS link -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
    integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
  <!-- Font Awesome link -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- CSS file -->
  <link rel="stylesheet" href="style.css">
  <style>
    #order-success {
      margin-bottom: 50px;
    }

    footer {
      margin-top: 0px;
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <header>
    <nav class="navbar navbar-expand-lg navbar-light bg-info">
      <img src="./images/logo.jpg" alt="Logo" class="logo">
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav mr-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item active">
            <a class="nav-link" href="product.html">Products <span class="sr-only">(current)</span></a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="aboutus.html">About us</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#"><i class="fa-solid fa-cart-shopping"></i><sup>1</sup></a>
          </li>
        </ul>
        <form class="form-inline my-2 my-lg-0">
          <ul class="navbar-nav mr-auto">
            <li class="nav-item">
              <a class="nav-link" href="#"><i class="fa-regular fa-user"></i></a>
            </li>
          </ul>
          <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
          <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
        </form>
      </div>
    </nav>
  </header>

  <br><br>

  <!-- Checkout Page Content -->
  <div class="container mt-5" id="checkout-content">
    <h2 class="text-center">Checkout</h2>

    <div class="row">
      <div class="col-md-6">
        <h4>Billing Information</h4>
        <form>
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" class="form-control" id="name" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" class="form-control" id="email" required>
          </div>
          <div class="form-group">
            <label for="address">Address</label>
            <input type="text" class="form-control" id="address" required>
          </div>
          <div class="form-group">
            <label for="city">City</label>
            <input type="text" class="form-control" id="city" required>
          </div>
          <div class="form-group">
            <label for="zip">Zip Code</label>
            <input type="text" class="form-control" id="zip" required>
          </div>
        </form>
      </div>

      <div class="col-md-6">
        <h4>Order Summary</h4>
        <table class="table table-bordered">
          <thead>
            <tr>
              <th>Product</th>
              <th>Price</th>
            </tr>
          </thead>
          <tbody id="order-summary">
            <!-- Order summary will be injected here by JavaScript -->
          </tbody>
          <tfoot>
            <tr>
              <th>Total</th>
              <th>$<span id="total-price">0.00</span></th>
            </tr>
          </tfoot>
        </table>
        <button class="btn btn-primary btn-block" onclick="placeOrder()">Place Order</button>
      </div>
    </div>
  </div>

  <!-- Success message -->
  <div id="order-success" class="alert alert-success text-center mt-5" style="display: none;">
    <h4>Your order was successfully placed. Thank you for your purchase!</h4>
  </div>

  <!-- JavaScript to handle order summary and placing an order -->
  <script>
    // Function to load and display cart items in the order summary on checkout page
    function loadOrderSummary() {
      const cartItems = JSON.parse(localStorage.getItem('cart')) || [];
      const orderSummary = document.getElementById('order-summary');
      let totalPrice = 0;

      // Clear existing content in the order summary table
      orderSummary.innerHTML = '';

      // If cart is empty
      if (cartItems.length === 0) {
        orderSummary.innerHTML = '<tr><td colspan="2">No items in the cart</td></tr>';
        document.getElementById('total-price').textContent = '0.00';
        return;
      }

      // Loop through the cart items and populate the order summary
      cartItems.forEach(item => {
        if (item.price && !isNaN(item.price)) {
          const row = document.createElement('tr');
          row.innerHTML = `<td>${item.name}</td><td>$${parseFloat(item.price).toFixed(2)}</td>`;
          orderSummary.appendChild(row);
          totalPrice += parseFloat(item.price);
        }
      });

      document.getElementById('total-price').textContent = totalPrice.toFixed(2);
    }

    // Function to handle order placement after checkout
    function placeOrder() {
      document.getElementById('checkout-content').style.display = 'none';
      document.getElementById('order-success').style.display = 'block';
      localStorage.removeItem('cart');
    }

    // Load the order summary when the page is loaded
    window.onload = loadOrderSummary;
  </script>

  <!-- Footer -->
  <footer class="bg-dark text-white mt-5 p-4 text-center">
    <div class="container">
      <div class="footer-links">
        <a href="index.html">Home</a> | <a href="products.html">Shop</a> | <a href="aboutus.html">About Us</a>
      </div>
      <p>Follow Us:</p>
      <div class="social-links">
        <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="#"><i class="fa-brands fa-instagram"></i></a>
        <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
      </div>
      <p>© 2024 Minzo. All Rights Reserved.</p>
    </div>
  </footer>

  <!-- Bootstrap JS (optional for responsive navbar) -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-OgVRvuATP1z7Jj0xB4RkBfu2bF3v9msz9k98k3jPya2IvF1rFFmAYj6I1gphSoW2" crossorigin="anonymous"></script>

</body>

</html>
